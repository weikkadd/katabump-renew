name: Katabump 自动续期

on:
  schedule:
  # 每天 UTC 0点 (北京时间 8点) 运行
  - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 安装系统依赖和 Python 依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk jq
        pip install seleniumbase requests
        seleniumbase install chromedriver

    - name: 设置代理 (sing-box)
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.PROXY_URL }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    - name: 预清理残留 Chrome 进程
      run: |
        echo "=== 预清理 ==="
        pkill -9 -f "chrome" 2>/dev/null || true
        pkill -9 -f "chromedriver" 2>/dev/null || true
        rm -rf /tmp/chrome_user_data 2>/dev/null || true
        sleep 2

    - name: 运行续期脚本
      env:
        # 兼容两种账号配置方式:
        # 1. USERS_JSON (多账号): [{"username":"...", "password":"..."}]
        # 2. KATABUMP_EMAIL + KATABUMP_PASSWORD (单账号)
        USERS_JSON: ${{ secrets.USERS_JSON }}
        KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
        KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python3 app.py

    - name: 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: |
          *.png
          screenshots/
        if-no-files-found: ignore

    - name: 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 3 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
